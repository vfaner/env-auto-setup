name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:  # 允许手动触发（调试用）

permissions:
  contents: write  # 需要写权限来创建 Release

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: env-auto-setup-windows-x64
            executable: env-auto-setup.exe
            asset_pattern: env-auto-setup.exe
          - os: macos-latest
            artifact_name: env-auto-setup-macos
            executable: env-auto-setup.app
            asset_pattern: env-auto-setup-macos.zip
          - os: ubuntu-latest
            artifact_name: env-auto-setup-linux-x64
            executable: env-auto-setup
            asset_pattern: env-auto-setup-linux-x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 libegl1 libxkbcommon0 libdbus-1-3 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xinerama0 libxcb-xkb1 libxkbcommon-x11-0

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build (Windows / Linux)
        if: matrix.os != 'macos-latest'
        run: |
          pyinstaller env-auto-setup.spec --noconfirm --clean

      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller env-auto-setup.spec --noconfirm --clean
          # 打成 zip，保留 .app 结构和权限
          cd dist
          zip -ry env-auto-setup-macos.zip env-auto-setup.app

      - name: Rename Linux binary
        if: matrix.os == 'ubuntu-latest'
        run: |
          mv dist/env-auto-setup dist/env-auto-setup-linux-x64
          chmod +x dist/env-auto-setup-linux-x64

      - name: Upload artifact (for debugging when workflow_dispatch)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/${{ matrix.asset_pattern }}
          if-no-files-found: error

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_pattern }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
